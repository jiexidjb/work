<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 / 注册 - 人们点评</title>
</head>
<body>

<header class="header">
    <div class="header-container">
        <div class="logo">人们点评</div>
        <div class="nav-items">
            <div class="nav-item">首页</div>
            <div class="nav-item active">登录</div>
            <div class="nav-item">注册</div>
        </div>
    </div>
</header>

<div class="login-container">
    <div class="tab-header">
        <div class="tab active" id="loginTab">登录</div>
        <div class="tab" id="registerTab">注册</div>
    </div>

    <!-- 登录表单 -->
    <div id="loginForm">
        <div class="form-group">
            <label class="form-label">手机号 / 用户名</label>
            <input type="text" class="form-input" id="loginAccount" placeholder="请输入手机号或用户名" value="13800138000">
        </div>
        <div class="form-group">
            <label class="form-label">密码</label>
            <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码" value="123456">
        </div>
        <button class="submit-btn" onclick="handleLogin()">登录</button>
        <div class="switch-text">
            还没有账号？ <a href="#" onclick="switchToRegister()">立即注册</a>
        </div>
    </div>

    <!-- 注册表单 -->
    <div id="registerForm" style="display: none;">
        <div class="form-group">
            <label class="form-label">手机号</label>
            <div class="input-with-btn">
                <input type="tel" class="form-input" id="regPhone" placeholder="请输入手机号" value="13800138000">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">验证码</label>
            <div class="input-with-btn">
                <input type="text" class="form-input" id="regCode" placeholder="请输入验证码" value="1234">
                <button class="code-btn" id="sendCodeBtn">获取验证码</button>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">设置密码</label>
            <input type="password" class="form-input" id="regPassword" placeholder="请输入密码" value="123456">
        </div>
        <button class="submit-btn" onclick="handleRegister()">注册</button>
        <div class="switch-text">
            已有账号？ <a href="#" onclick="switchToLogin()">立即登录</a>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="footer-container">
        <div class="footer-text">人们点评 - 发现身边的好店</div>
        <div class="footer-text">客服电话：400-123-4567</div>
        <div class="copyright">© 2026 人们点评 版权所有</div>
    </div>
</footer>

</body>
</html>
